# copier.yaml
project_name:
  type: str
  help: "プロジェクト名（英数字・ハイフンのみ）を入力してください:"
  default: "autonomous-dev-env"

python_version:
  type: str
  help: "使用するPythonのバージョンを指定してください:"
  default: "3.12"

# テンプレートの「ルート」をサブフォルダに限定する
_subdirectory: "project_template"

# プロジェクト展開時にコピー「しない」ファイルの指定
# プロジェクトリポジトリのビジネスロジックを上書き・削除する事故を防止するための措置
_exclude:
  - "src/**"
  - "tests/**"

_answers_file: ".copier-answers.yml"